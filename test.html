<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GLTF Loader Test</title>
<style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; position:fixed; inset:0; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,10,50);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
const ambient = new THREE.AmbientLight(0xffffff, 1);
scene.add(ambient);
const directional = new THREE.DirectionalLight(0xffffff, 1.2);
directional.position.set(10,10,10);
scene.add(directional);

// GLTF Loader mit Online-Modell
const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
  gltf => { scene.add(gltf.scene); },
  undefined,
  e => console.error(e)
);

function animate(){
  requestAnimationFrame(animate);
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
