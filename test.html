<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GLTF Kamera auf Modell Mitte</title>
<style>
    body { margin:0; overflow:hidden; }
    canvas { display:block; position:fixed; inset:0; }
</style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/loaders/GLTFLoader.js';

// Szene & Renderer
const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Kamera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const radius = 50;   // Abstand zur Modellmitte
const height = 10;   // Höhe der Kamera
let angle = 0;       // Rotationswinkel

// Licht
const ambient = new THREE.AmbientLight(0xffffff, 1.5);
scene.add(ambient);
const directional = new THREE.DirectionalLight(0xffffff, 1.2);
directional.position.set(10,20,10);
scene.add(directional);

// Gruppe für das Modell (hilfreich für Rotation)
const modelGroup = new THREE.Group();
scene.add(modelGroup);

let modelCenter = new THREE.Vector3(0,0,0); // Mittelpunkt des Modells

// GLTF Loader
const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
  gltf => {
    const model = gltf.scene;
    modelGroup.add(model);

    // Modell skalieren falls nötig
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 20 / maxDim;
    model.scale.setScalar(scale);

    // Mittelpunkt für die Kamera
    modelCenter = box.getCenter(new THREE.Vector3());
  },
  undefined,
  e => console.error('Ladefehler:', e)
);

// Animation
function animate() {
    requestAnimationFrame(animate);

    // Kamera rotiert um Modell
    angle += 0.002;
    camera.position.x = Math.cos(angle) * radius;
    camera.position.z = Math.sin(angle) * radius;
    camera.position.y = height;

    // Kamera schaut auf Mittelpunkt des Modells
    camera.lookAt(modelCenter);

    renderer.render(scene, camera);
}
animate();

// Fenster-Resize
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
